services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: adinkra_faro_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      PORT: "5010"
      HOSTNAME: "0.0.0.0"
    ports:
      - "127.0.0.1:5010:5010"
