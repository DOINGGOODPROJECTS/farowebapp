services:

  # ── MySQL ───────────────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: faro_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ./faro_backend/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Backend (Next.js API) ───────────────────────────────────────────────────
  backend:
    build:
      context: ./faro_backend
      dockerfile: Dockerfile
    container_name: faro_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./faro_backend/.env.production
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      DB_HOST: db
      DB_PORT: "3306"
    expose:
      - "5000"
    ports:
      - "5000:5000"

  # ── Frontend (Next.js app) ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./faro_frontend
      dockerfile: Dockerfile
      args:
        BACKEND_URL: http://backend:5000
    container_name: faro_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      BACKEND_URL: http://backend:5000
    expose:
      - "3100"
    ports:
      - "3100:3100"

  # Note: host Nginx will handle TLS and proxying. The dockerized nginx
  # service has been removed to avoid conflicts with the host nginx.

volumes:
  db_data:
